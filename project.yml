name: HearZork
options:
  bundleIdPrefix: com.awohl.hearzork
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
targets:
  HearZork_iOS:
    type: application
    platform: iOS
    sources:
      - HearZork
    resources:
      - path: HearZork/Resources
        optional: true
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awohl.hearzork
        PRODUCT_NAME: HearZork
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: HearZork/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: HearZork
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: HearZork uses speech recognition for voice-controlled gameplay.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: HearZork needs microphone access to hear your voice commands.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.adventure-games"
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
    entitlements:
      path: HearZork/HearZork.entitlements
  HearZorkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: HearZork_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awohl.hearzork.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HearZork.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HearZork"
