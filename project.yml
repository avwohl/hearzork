name: HearZork
options:
  bundleIdPrefix: com.awohl.hearzork
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
targets:
  HearZork_iOS:
    type: application
    platform: iOS
    sources:
      - HearZork
    resources:
      - path: HearZork/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awohl.hearzork
        PRODUCT_NAME: HearZork
        INFOPLIST_VALUES: >-
          PRODUCT_NAME=$(TARGET_NAME)
          CFBundleDisplayName=HearZork
          NSSpeechRecognitionUsageDescription=HearZork uses speech recognition for voice-controlled gameplay.
          NSMicrophoneUsageDescription=HearZork needs microphone access to hear your voice commands.
          UILaunchScreen={}
    entitlements:
      path: HearZork/HearZork.entitlements
  HearZork_macOS:
    type: application
    platform: macOS
    sources:
      - HearZork
    resources:
      - path: HearZork/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awohl.hearzork
        PRODUCT_NAME: HearZork
        INFOPLIST_VALUES: >-
          PRODUCT_NAME=$(TARGET_NAME)
          CFBundleDisplayName=HearZork
          NSSpeechRecognitionUsageDescription=HearZork uses speech recognition for voice-controlled gameplay.
          NSMicrophoneUsageDescription=HearZork needs microphone access to hear your voice commands.
    entitlements:
      path: HearZork/HearZork.entitlements
  HearZorkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: HearZork_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awohl.hearzork.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HearZork.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HearZork"
